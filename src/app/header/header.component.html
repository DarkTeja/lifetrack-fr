<header class="topbar glass-panel">
  <div class="header-left">
    <div class="date-display">
      <span class="calendar-icon">📅</span>
      <span class="current-date">{{ currentDate | date:'EEEE, MMMM d' }}</span>
    </div>
  </div>
  
  <div class="header-actions">
    <!-- AI SYNC STATUS -->
    <div class="sync-status hover-glow">
      <span class="sync-dot pulsing"></span>
      <span class="sync-text">AI Core Active</span>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="header-btns">
      <button class="icon-btn" title="Notifications">
        <span class="btn-glyph">🔔</span>
      </button>
      <button class="icon-btn" routerLink="/settings" title="Settings">
        <span class="btn-glyph">⚙️</span>
      </button>
    </div>
  </div>
</header>
