<nav class="sidebar glass-panel" [class.mobile-open]="isMobileOpen">

      <div class="logo-mark">LT</div>
      <span class="user-greeting">{{userName}}</span>
      <span *ngIf="loggedToday" class="streak-badge" title="You've logged something today!">🔥</span>
    </div>
    <button class="hamburger" (click)="toggleMenu()">
      <span [class.open]="isMobileOpen"></span>
      <span [class.open]="isMobileOpen"></span>
      <span [class.open]="isMobileOpen"></span>

  <div class="nav-links mt-5">

      <span class="label">Overview</span>
    </a>
    <a routerLink="/learning" routerLinkActive="active" class="nav-item" (click)="isMobileOpen = false">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <span class="label">Study</span>
    </a>
    <a routerLink="/health" routerLinkActive="active" class="nav-item" (click)="isMobileOpen = false">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span class="label">Health</span>
    </a>
    <a routerLink="/work" routerLinkActive="active" class="nav-item" (click)="isMobileOpen = false">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
      <span class="label">Work</span>
    </a>
    <a routerLink="/finance" routerLinkActive="active" class="nav-item" (click)="isMobileOpen = false">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span class="label">Finance</span>
    </a>
    <a routerLink="/reports" routerLinkActive="active" class="nav-item" (click)="isMobileOpen = false">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span class="label">Reports</span>

    <a class="nav-item" style="cursor:pointer;" (click)="toggleMode()">
      <svg *ngIf="isDark" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg *ngIf="!isDark" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>

      <span class="label">Logout</span>

<!-- LOGOUT CONFIRMATION MODAL -->
<div class="logout-overlay" *ngIf="showLogoutConfirm" (click)="showLogoutConfirm = false">
  <div class="logout-modal glass-panel" (click)="$event.stopPropagation()">
    <div class="logout-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </div>
    <h3 class="logout-title">Sign Out?</h3>
    <p class="logout-sub">You'll be returned to the login screen. All your data is safely saved.</p>
    <div class="logout-actions">
      <button class="btn-cancel" (click)="showLogoutConfirm = false">Stay</button>
      <button class="btn-logout-confirm" (click)="logout()">Yes, Log Out</button>
    </div>
  </div>
</div>
